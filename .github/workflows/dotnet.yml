name: .NET

on: [push]

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Tag the repository
        id: tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          TAG=v$(date -Iseconds | sed 's/[T:\+]/-/g')
          echo "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git tag -a $TAG -m "Published version $TAG" ${GITHUB_SHA}
          git push origin $TAG
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v0.1.13
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          tag_name: ${{ steps.tag.outputs.tag }}
  build:
    name: Build Release
    needs: create_release
    strategy:
      matrix:
        kind: ['linux', 'windows', 'macOS']
        include:
          - kind: linux
            os: ubuntu-latest
            target: linux-x64
            what: WoWArchiveCompare.cs
          - kind: windows
            os: windows-latest
            target: win-x64
            what: WoWArchiveCompare.cs
          - kind: macOS
            os: macos-latest
            target: osx-x64
            what: WoWArchiveCompare.cs
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore ${{ matrix.what }}
    - name: Build
      run: dotnet publish -c Release -r ${{ matrix.target }} -p:PublishAot=true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:TrimMode=link --self-contained false -f net10.0 ${{ matrix.what }}
    - name: Archive Release
      uses: thedoctor0/zip-release@main
      with:
        directory: ${{ github.workspace }}/artifacts/WoWArchiveCompare
        type: 'zip'
        filename: ${{ github.workspace }}/Release-${{ matrix.target }}.zip
    - name: Release
      uses: softprops/action-gh-release@v0.1.13
      with:
        files: ${{ github.workspace }}/Release-${{ matrix.target }}.zip
        tag_name: ${{ steps.tag.outputs.tag }}
